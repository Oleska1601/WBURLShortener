services:

  postgres:
    container_name: postgres
    image: postgres
    env_file:
      .env
    environment:
      POSTGRES_HOST: ${DB_POSTGRES_HOST}
      POSTGRES_USER: ${DB_POSTGRES_USERNAME}    
      POSTGRES_PASSWORD: ${DB_POSTGRES_PASSWORD} 
      POSTGRES_DB: ${DB_POSTGRES_DATABASE}      
    volumes:
      - postgres-data:/var/lib/postgresql # создание хранилища (без него все данные исчезнут после перезапуска контейнера)
    ports:
      - "5432:5432"
    restart: always
    networks:
      - shortener_network

  redis:
    image: "redis:latest"
    ports:
      - "6379:6379"
    restart: unless-stopped
    volumes:
      - redis-data:/data  
    networks:
      - shortener_network

  shortener:
    container_name: shortener
    image: shortener
    env_file:
      .env
    build: 
      context: .
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    depends_on:
      - postgres 
      - redis
    restart: unless-stopped     
    networks:
      - shortener_network

volumes:
  postgres-data:
  redis-data:

networks:
  shortener_network:
    driver: bridge 