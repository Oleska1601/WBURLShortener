<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Shortener</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body { font-family: Arial; max-width: 800px; margin: 0 auto; padding: 20px; }
        .section { margin: 30px 0; padding: 20px; border: 1px solid #ddd; border-radius: 8px; }
        h1 { color: #333; text-align: center; }
        h3 { color: #555; margin-bottom: 15px; }
        input { 
            padding: 10px; 
            margin: 5px; 
            width: 300px; 
            border: 1px solid #ccc; 
            border-radius: 4px; 
        }
        button { 
            padding: 10px 20px; 
            margin: 5px; 
            background: #007bff; 
            color: white; 
            border: none; 
            border-radius: 4px; 
            cursor: pointer; 
        }
        button:hover { background: #0056b3; }
        .result { margin: 15px 0; padding: 15px; border-radius: 4px; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .url { 
            font-family: monospace; 
            background: #f8f9fa; 
            padding: 10px; 
            margin: 10px 0;
            border-radius: 4px;
            word-break: break-all;
        }
        .analytics-data {
            background: #2c3e50;
            color: white;
            padding: 15px;
            border-radius: 4px;
            font-family: monospace;
            white-space: pre-wrap;
            max-height: 400px;
            overflow-y: auto;
        }
        .action-buttons { margin: 10px 0; }
        .action-buttons button { 
            background: #28a745; 
            margin-right: 10px; 
        }
        .action-buttons button:hover { background: #218838; }
    </style>
</head>
<body>
    <h1>URL Shortener</h1>

    <!-- Создание ссылки -->
    <div class="section">
        <h3>Создать короткую ссылку</h3>
        <div>
            <input type="url" id="urlInput" placeholder="Введите длинный URL (обязательно)">
            <input type="text" id="customInput" placeholder="Кастомная ссылка (необязательно)">
            <button onclick="createShortUrl()">Создать</button>
        </div>
        <div id="createResult"></div>
    </div>

    <!-- Аналитика -->
    <div class="section">
        <h3>Получить аналитику</h3>
        <div>
            <input type="text" id="analyticsInput" placeholder="Введите короткую ссылку">
            <button onclick="getAnalytics()">Получить аналитику</button>
        </div>
        <div id="analyticsResult"></div>
    </div>

    <!-- Тестирование -->
    <div class="section">
        <h3>Тестирование перехода</h3>
        <div>
            <input type="text" id="testInput" placeholder="Введите короткую ссылку для теста">
            <button onclick="testRedirect()">Тестировать переход</button>
        </div>
    </div>
<div id="testResult"></div>
    <script src="app.js"></script>
</body>
</html>
